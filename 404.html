<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages-extra.css">
    <title>Page Not Found - Stackly Freight Brokerage</title>
</head>

<body>

    <section class="error-page">
        <div class="error-inner">
            <a href="./index.html">
                <img src="./src/logo/Untitled design-compressed (1).webp" alt="Stackly logo" style="width:150px; margin-bottom: var(--space-2xl);">
            </a>

            <div class="error-code">4<span class="dot">0</span>4</div>
            <div class="error-truck"><i class="fa-solid fa-truck-fast"></i></div>

            <h2>This shipment took a wrong turn</h2>
            <p>The page you're looking for doesn't exist, moved, or never made it out of the warehouse. Let's get you back on route.</p>

            <div class="error-actions">
                <a href="./index.html" class="btn-primary">Back to Home <i class="fa-solid fa-arrow-right"></i></a>
                <a href="./contact.html" class="btn-ghost">Contact Support</a>
            </div>
        </div>
    </section>

</body>

</html>
